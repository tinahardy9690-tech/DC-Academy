[build]
  command = "npm run build"
  publish = "outputs/ghl-letter-studio"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/admin"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/library"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/library/*"
  to = "/index.html"
  status = 200
